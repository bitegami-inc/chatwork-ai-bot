services:
  - type: web
    name: chatwork-ai-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: CHATWORK_API_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CHATWORK_ROOM_ID
        value: "343258579"
      - key: BOT_ACCOUNT_ID
        value: "10506675"
